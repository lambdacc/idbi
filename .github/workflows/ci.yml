name: CI

on:
  push:
    branches: [master, main, "feature/**"]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # n>=1000 keeps the eval-harness PSI gate meaningful — at n~200 the
      # train/holdout PSI flags "shift" from small-sample noise alone.
      - name: Generate synthetic cohort
        run: python -m app.data_gen.build_dataset --n 1000

      - name: Run tests
        run: python -m pytest app/tests -q

      - name: Run eval harness
        run: python -m app.ml.eval.runner

      - name: Archetype demo scorecard
        run: python -m app.ml.train

      - name: Build Docker image
        run: docker build -t creditpulse:ci .
